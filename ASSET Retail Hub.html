/* ----------------------------- storage layer ---------------------------- */
async function loadKey(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    if (v != null) return JSON.parse(v);
    return fallback;
  } catch (e) { return fallback; }
}
async function saveKey(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch (e) { console.error("save failed", key, e); }
}
function useCollection(key, seed) {
  const [items, setItems] = useState(seed);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    let active = true;
    (async () => {
      const v = await loadKey(key, null);
      if (active) { if (v != null) setItems(v); setLoaded(true); }
    })();
    return () => { active = false; };
  }, []);
  useEffect(() => { if (loaded) saveKey(key, items); }, [items, loaded]);
  return [items, setItems, loaded];
}

/* ------------------------------- UI helpers ------------------------------ */
function Badge({ value, cmap, fallback }) {
  if (!value) return <span className="muted">—</span>;
  const c = tag((cmap && cmap[value]) || fallback || "gray");
  return <span className="badge" style={{ background: c.bg, color: c.fg }}>{value}</span>;
}
function fmtDate(d) {
  if (!d) return "";
  try {
    const dt = new Date(d + "T00:00:00");
    return dt.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  } catch { return d; }
}
function startOfWeek() {
  const n = new Date();
  const day = (n.getDay() + 6) % 7; // Monday = 0
  n.setHours(0, 0, 0, 0);
  n.setDate(n.getDate() - day);
  return n;
}

/* -------------------------------- modal ---------------------------------- */
function EditModal({ kind, record, onSave, onClose }) {
  const fields = FIELDS[kind];
  const blank = useMemo(() => {
    const o = { id: uid() };
    fields.forEach((f) => (o[f.k] = f.def || ""));
    return o;
  }, [kind]);
  const [form, setForm] = useState(record ? { ...record } : blank);
  const titleField = fields.find((f) => f.title);
  const valid = !titleField || (form[titleField.k] || "").trim().length > 0;
  const set = (k, v) => setForm((s) => ({ ...s, [k]: v }));

  return (
    <div className="overlay" onMouseDown={onClose}>
      <div className="modal" onMouseDown={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <span className="eyebrow">{record ? "Edit record" : "New record"}</span>
          <button className="icon-btn" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div className="modal-body">
          {fields.map((f) => (
            <label className="field" key={f.k}>
              <span className="field-label">{f.label}{f.req ? " *" : ""}</span>
              {f.type === "select" ? (
                <select value={form[f.k] || ""} onChange={(e) => set(f.k, e.target.value)}>
                  <option value="">—</option>
                  {f.opts.map((o) => <option key={o} value={o}>{o}</option>)}
                </select>
              ) : f.type === "textarea" ? (
                <textarea rows={f.big ? 8 : 3} value={form[f.k] || ""} onChange={(e) => set(f.k, e.target.value)} />
              ) : (
                <input type={f.type === "date" ? "date" : f.type === "email" ? "email" : "text"}
                  value={form[f.k] || ""} onChange={(e) => set(f.k, e.target.value)} />
              )}
            </label>
          ))}
        </div>
        <div className="modal-foot">
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn primary" disabled={!valid} onClick={() => onSave(form)}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ------------------------------ table view ------------------------------- */
function DataTable({ rows, cols, onEdit, onDelete }) {
  if (!rows.length)
    return <div className="empty">Nothing here yet. Use <b>New</b> to add your first record.</div>;
  return (
    <div className="table-wrap">
      <table>
        <thead>
          <tr>{cols.map((c) => <th key={c.k} style={c.w ? { width: c.w } : null}>{c.label}</th>)}<th className="row-actions-h"></th></tr>
        </thead>
        <tbody>
          {rows.map((r) => (
            <tr key={r.id} onClick={() => onEdit(r)}>
              {cols.map((c) => <td key={c.k}>{c.render ? c.render(r) : (r[c.k] || <span className="muted">—</span>)}</td>)}
              <td className="row-actions" onClick={(e) => e.stopPropagation()}>
                <button className="icon-btn sm" title="Delete" onClick={() => onDelete(r.id)}>🗑</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

  const [shows, setShows, lsh] = useCollection("asset:shows", SEED.shows);
  const [notes, setNotes, ln] = useCollection("asset:notes", SEED.notes);
  const ready = lp && lt && lpi && ls && lsh && ln;

  const setters = { tasks: setTasks, pipeline: setPipeline, strategy: setStrategy, shows: setShows, notes: setNotes };
  const data = { tasks, pipeline, strategy, shows, notes };

  const saveRecord = (kind, form) => {
    setters[kind]((arr) => {
      const exists = arr.some((x) => x.id === form.id);
      return exists ? arr.map((x) => (x.id === form.id ? form : x)) : [form, ...arr];
    });
    setEditing(null);
  };
  const deleteRecord = (kind, id) => setters[kind]((arr) => arr.filter((x) => x.id !== id));
  const markSample = (id) => setPipeline((arr) => arr.map((p) => {
    if (p.id !== id) return p;
    const advance = PIPE_STAGE.indexOf(p.stage) < PIPE_STAGE.indexOf("3. Sample Sent");
    return { ...p, sampleSent: today(), stage: advance ? "3. Sample Sent" : p.stage };
  }));

  /* KPI computations */
  const kpi = useMemo(() => {
    const sow = startOfWeek();
    const samplesThisWeek = pipeline.filter((p) => {
      if (!p.sampleSent) return false;
      const d = new Date(p.sampleSent + "T00:00:00");
      return d >= sow;
    }).length;
    const touchesThisWeek = pipeline.filter((p) => {
      if (!p.lastContact) return false;
      const d = new Date(p.lastContact + "T00:00:00");
      return d >= sow;
    }).length;
    const stageCounts = {};
    PIPE_STAGE.forEach((s) => (stageCounts[s] = 0));
    pipeline.forEach((p) => { if (p.stage in stageCounts) stageCounts[p.stage]++; });
    const converted = stageCounts["6. Converted"] || 0;
    const active = pipeline.filter((p) => !["6. Converted", "7. No Response", "8. Not a Fit"].includes(p.stage)).length;
    const taskCounts = {};
    TASK_STATUS.forEach((s) => (taskCounts[s] = 0));
    tasks.forEach((t) => { if (t.status in taskCounts) taskCounts[t.status]++; });
    const openTasks = (taskCounts["To Do"] || 0) + (taskCounts["In Progress"] || 0) + (taskCounts["Waiting"] || 0);
    const working = strategy.filter((s) => s.status === "Working").length;
    const notWorking = strategy.filter((s) => s.status === "Not Working").length;
    return { samplesThisWeek, touchesThisWeek, stageCounts, converted, active, openTasks, taskCounts, working, notWorking };
  }, [pipeline, tasks, strategy]);

  if (!ready)
    return (
      <div className="boot"><style>{CSS}</style>
        <div className="boot-mark">ASSET</div>
        <div className="boot-sub">Loading your Retail Hub…</div>
      </div>
    );

    { k: "dashboard", label: "Dashboard", icon: "◧" },
    { k: "pipeline", label: "Pipeline", icon: "▤" },
    { k: "tasks", label: "Tasks", icon: "✓" },
    { k: "strategy", label: "Strategy", icon: "◆" },
    { k: "shows", label: "Trade Shows", icon: "▣" },
    { k: "notes", label: "Notes", icon: "✎" },
  ];

    <div className="app"><style>{CSS}</style>

      {/* RAIL */}

        <div className="brand">
          <div className="wordmark">ASSET</div>
          <div className="brand-sub">Retail Hub</div>
        </div>

            <button key={n.k} className={"nav-item" + (view === n.k ? " active" : "")} onClick={() => setView(n.k)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div className="rail-foot">
          <button className="reset" onClick={() => {
            if (confirm("Clear all sample data and start empty? This cannot be undone.")) {
              setTasks([]); setPipeline([]); setStrategy([]); setShows([]);

        </div>
      </aside>

      {/* MAIN */}
      <main className="main">
        {view === "dashboard" && (

        {view === "pipeline" && (
          <Module title="Pipeline" sub="Wholesale prospects across channels, tiers, and stages"
            actions={

                <div className="seg">

                </div>
                <select className="filter" value={pipeFilter} onChange={(e) => setPipeFilter(e.target.value)}>
                  <option>All</option>
                  {PIPE_CHANNEL.map((c) => <option key={c}>{c}</option>)}
                </select>
                <button className="btn primary" onClick={() => setEditing({ kind: "pipeline", record: null })}>+ New</button>
              </>
            }>
            {(() => {
              const rows = pipeFilter === "All" ? pipeline : pipeline.filter((p) => p.channel === pipeFilter);
              if (pipeMode === "table")

                    { k: "tier", label: "Tier", render: (r) => <Badge value={r.tier} cmap={PIPE_TIER_C} /> },
                    { k: "stage", label: "Stage", render: (r) => <Badge value={r.stage} cmap={PIPE_STAGE_C} /> },
                    { k: "region", label: "Region" },

              return (

            })()}
          </Module>
        )}

        {view === "tasks" && (
          <Module title="Tasks" sub="Active workstream management"
            actions={
              <>
                <select className="filter" value={taskFilter} onChange={(e) => setTaskFilter(e.target.value)}>
                  <option>All</option>

              rows={taskFilter === "All" ? tasks : tasks.filter((t) => t.status === taskFilter)}
              cols={[
                { k: "title", label: "Task", w: "34%" },
                { k: "status", label: "Status", render: (r) => <Badge value={r.status} cmap={TASK_STATUS_C} /> },
                { k: "priority", label: "Priority", render: (r) => <Badge value={r.priority} cmap={TASK_PRIORITY_C} /> },
                { k: "project", label: "Project", render: (r) => <Badge value={r.project} fallback="blue" /> },

                { k: "priority", label: "Priority", render: (r) => <Badge value={r.priority} cmap={STRAT_PRIORITY_C} /> },
                { k: "action", label: "Next step", render: (r) => <span className="clip">{r.action || "—"}</span> },
              ]}
              onEdit={(r) => setEditing({ kind: "strategy", record: r })}
              onDelete={(id) => deleteRecord("strategy", id)} />
          </Module>
        )}

        {view === "shows" && (
          <Module title="Trade Shows" sub="Plan, budget, and track every show"
            actions={<button className="btn primary" onClick={() => setEditing({ kind: "shows", record: null })}>+ New</button>}>
            {!shows.length ? <div className="empty">No shows yet. Use <b>New</b> to plan one.</div> : (
              <div className="show-grid">
                {shows.map((s) => (
                  <div className="show-card" key={s.id} onClick={() => setEditing({ kind: "shows", record: s })}>

                    <div className="show-title">{s.title}</div>

        {view === "notes" && (
          <Module title="Notes" sub="Decisions, meetings, and context"

  );

                    <span className="funnel-n">{n}</span>

          {/* Tasks by status */}
          <section className="panel">

              <button className="btn ghost sm" onClick={() => go("tasks")}>Open</button></div>
            <div className="panel-body chips">
              {TASK_STATUS.map((s) => (
                <div className="chip" key={s}><Badge value={s} cmap={TASK_STATUS_C} /><span className="chip-n">{kpi.taskCounts[s] || 0}</span></div>
              ))}

const CSS = `
:root{
  --canvas:#F3F3F5; --paper:#FFFFFF; --line:#E4E3E8; --line-soft:#EEEDF1;
  --ink:#18181B; --ink-2:#2C2C32; --text:#1F1F23; --muted:#71717A;
  --accent:#7C3AED; --accent-ink:#6D28D9; --accent-soft:#EBE3FB;
  --good:#2F7A4F; --bad:#C0392B; --warn:#C99A12;
  --r:10px; --r-sm:7px; --shadow:0 1px 2px rgba(24,24,27,.05),0 4px 16px rgba(24,24,27,.05);
}
*{box-sizing:border-box}
.app,.boot{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text)}
.app{display:flex;min-height:100vh;background:var(--canvas)}
.serif{font-family:Georgia,"Times New Roman",serif}
.muted{color:var(--muted)}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-ink);font-weight:700}
.good{color:var(--good)}

/* boot */
.boot{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--canvas)}
.boot-mark{font-size:30px;font-weight:800;letter-spacing:.34em;color:var(--ink);padding-left:.34em}
.boot-sub{margin-top:10px;color:var(--muted);font-size:13px}

/* rail */
.rail{width:228px;flex:0 0 228px;background:var(--ink);color:#E8EAEF;display:flex;flex-direction:column;padding:22px 14px;position:sticky;top:0;height:100vh}
.brand{padding:6px 10px 22px}
.wordmark{font-size:21px;font-weight:800;letter-spacing:.36em;padding-left:.36em;color:#fff}
.brand-sub{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#9AA3B5;margin-top:6px;padding-left:.04em}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-item{display:flex;align-items:center;gap:11px;background:none;border:0;color:#B9C0CF;font-size:14px;text-align:left;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;font-weight:500;position:relative;transition:background .12s,color .12s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(255,255,255,.10);color:#fff}
.nav-item.active::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--accent)}
.nav-icon{width:18px;text-align:center;font-size:13px;opacity:.85}
.rail-foot{padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
.reset{background:none;border:1px solid rgba(255,255,255,.16);color:#9AA3B5;font-size:12px;padding:8px 10px;border-radius:var(--r-sm);width:100%;cursor:pointer}
.reset:hover{color:#fff;border-color:rgba(255,255,255,.3)}

/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:26px 32px 18px;flex-wrap:wrap}
.module-title{font-size:26px;font-weight:700;margin:2px 0 0;letter-spacing:-.01em;color:var(--ink)}
.module-title.serif{font-size:30px;font-weight:600}
.module-sub{margin:5px 0 0;color:var(--muted);font-size:13px}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.module-body{padding:6px 32px 40px;flex:1}

/* buttons + inputs */
.btn{font-size:13px;font-weight:600;padding:9px 15px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--paper);cursor:pointer;color:var(--text);transition:.12s}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:var(--ink-2)}
.btn.primary:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:transparent}
.btn.ghost:hover{background:#fff;border-color:var(--accent);color:var(--accent)}
.icon-btn{background:none;border:0;cursor:pointer;font-size:14px;color:var(--muted);padding:4px;border-radius:6px}
.icon-btn:hover{color:var(--text);background:var(--line-soft)}
.icon-btn.sm{font-size:13px}
.filter,select.filter{font-size:13px;padding:8px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--text);cursor:pointer}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;background:var(--paper)}
.seg button{border:0;background:none;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--muted);font-weight:600}
.seg button.on{background:var(--ink);color:#fff}

/* table */
.table-wrap{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:13px 16px;border-bottom:1px solid var(--line);background:#FBF9F5}
tbody td{padding:13px 16px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:#FBF9F4}
tbody tr:last-child td{border-bottom:0}
td:first-child{font-weight:600;color:var(--ink)}
.row-actions{text-align:right;width:44px}.row-actions-h{width:44px}
.clip{display:inline-block;max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom;color:var(--muted)}
.empty{background:var(--paper);border:1px dashed var(--line);border-radius:var(--r);padding:48px;text-align:center;color:var(--muted);font-size:14px}

/* badge */
.badge{display:inline-block;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;line-height:1.5;white-space:nowrap}

/* board */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
.col{flex:0 0 248px;background:var(--line-soft);border-radius:var(--r);padding:10px;min-height:120px}
.col-head{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 10px}
.count{font-size:12px;color:var(--muted);font-weight:700}
.col-body{display:flex;flex-direction:column;gap:8px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px;cursor:pointer;box-shadow:var(--shadow);transition:.12s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card-title{font-size:13.5px;font-weight:650;color:var(--ink);margin-bottom:8px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.card-meta{margin-top:8px;font-size:11.5px;color:var(--muted)}
.card-actions{margin-top:9px;display:flex}
.card-log{font-size:11.5px;font-weight:600;border:1px solid var(--line);background:var(--paper);color:var(--accent-ink);padding:4px 10px;border-radius:6px;cursor:pointer;transition:.12s;white-space:nowrap}
.card-log:hover{border-color:var(--accent);background:var(--accent-soft)}
.col-empty{color:var(--muted);font-size:13px;text-align:center;padding:8px}

/* priorities strip in strategy */
.prio-strip{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
.prio-list{display:flex;gap:22px;flex-wrap:wrap;margin-top:10px}
.prio{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:550;color:var(--ink)}
.prio-n{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);font-size:12px;font-weight:800;flex:0 0 22px}
.prio-input{flex:1;min-width:200px;font-size:14px;padding:6px 9px;border:1px solid var(--line);border-radius:6px}

/* trade show cards */
.show-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
.show-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px;cursor:pointer;box-shadow:var(--shadow);transition:.12s}
.show-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.show-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.show-date{font-size:12px;color:var(--muted);font-weight:600}
.show-title{font-size:16px;font-weight:700;color:var(--ink)}
.show-loc{font-size:12.5px;color:var(--muted);margin-top:3px}
.show-goal{font-size:13px;margin-top:10px;color:var(--text)}
.show-foot{margin-top:12px;padding-top:10px;border-top:1px solid var(--line-soft);font-size:12px;color:var(--text);font-weight:600}

/* notes */
.notes-split{display:grid;grid-template-columns:280px 1fr;gap:16px}
.notes-list{display:flex;flex-direction:column;gap:6px}
.note-row{text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;cursor:pointer;transition:.12s}
.note-row:hover{border-color:var(--accent)}
.note-row.active{border-color:var(--ink);background:#FBF9F4}
.note-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.note-date{font-size:11px;color:var(--muted)}
.note-row-title{font-size:13.5px;font-weight:650;color:var(--ink)}
.note-detail{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:24px 26px;box-shadow:var(--shadow)}
.note-detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.note-actions{display:flex;gap:8px}
.note-h{font-size:22px;margin:0 0 14px;color:var(--ink);font-weight:700}
.note-body{white-space:pre-wrap;line-height:1.65;font-size:14.5px;color:var(--text)}

/* kpi strip */
.kpi-strip{display:grid;grid-template-columns:1.7fr 1fr 1fr 1fr 1fr;gap:14px;margin-bottom:18px}
.gauge,.stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.gauge-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}
.gauge-num{font-size:26px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.gauge-goal{font-size:15px;color:var(--muted);font-weight:600}
.gauge-bar{height:9px;background:var(--line-soft);border-radius:20px;overflow:hidden}
.gauge-fill{height:100%;background:linear-gradient(90deg,var(--accent),#A472F2);border-radius:20px;transition:width .5s ease}
.gauge-foot{margin-top:9px;font-size:12px;color:var(--muted)}
.gauge-foot2{margin-top:3px;font-size:11.5px;color:var(--muted);opacity:.85}
.stat{display:flex;flex-direction:column;justify-content:center}
.stat-num{font-size:28px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
.stat-num.good{color:var(--good)}
.stat-label{font-size:11.5px;color:var(--muted);margin-top:7px;letter-spacing:.02em}

/* dashboard grid */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line-soft)}
.panel-head h3{margin:0;font-size:14px;font-weight:700;color:var(--ink)}
.panel-body{padding:16px 18px;display:flex;flex-direction:column;gap:11px}
.funnel-row{display:flex;align-items:center;gap:11px}
.funnel-label{font-size:12px;color:var(--text);flex:0 0 130px}
.funnel-track{flex:1;height:8px;background:var(--line-soft);border-radius:20px;overflow:hidden}
.funnel-fill{display:block;height:100%;border-radius:20px;min-width:2px;opacity:.85;transition:width .4s}
.funnel-n{font-size:12px;font-weight:700;color:var(--ink);width:20px;text-align:right}
.chips{flex-direction:row;flex-wrap:wrap;gap:8px}
.chip{display:flex;align-items:center;gap:7px;background:var(--line-soft);border-radius:20px;padding:5px 11px 5px 6px}
.chip-n{font-size:13px;font-weight:800;color:var(--ink)}
.signal{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:var(--ink)}
.dot{width:9px;height:9px;border-radius:50%}.dot.good{background:var(--good)}.dot.bad{background:var(--bad)}
.signal-list{margin-top:6px;display:flex;flex-direction:column;gap:9px}
.signal-item{font-size:13px;font-weight:600;color:var(--ink);display:flex;flex-direction:column;gap:2px;padding-left:18px;border-left:2px solid var(--bad)}
.signal-action{font-size:12px;font-weight:400;color:var(--muted)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(24,24,27,.45);display:flex;align-items:flex-start;justify-content:center;padding:48px 16px;z-index:50;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:var(--paper);border-radius:14px;width:100%;max-width:520px;box-shadow:0 24px 64px rgba(27,36,53,.28);overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line-soft)}
.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px;max-height:60vh;overflow-y:auto}
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:12px;font-weight:600;color:var(--muted)}
.field input,.field select,.field textarea{font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--text);font-family:inherit;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
.field textarea{resize:vertical;line-height:1.5}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line-soft);background:#FBF9F5}

@media (max-width:880px){
  .app{flex-direction:column}
  .rail{width:100%;flex:none;height:auto;position:static;flex-direction:row;align-items:center;padding:12px;overflow-x:auto;gap:8px}
  .brand{padding:0 10px 0 4px;flex:0 0 auto}.wordmark{font-size:16px}.brand-sub{display:none}
  .nav{flex-direction:row;gap:4px}.nav-item{padding:8px 11px;white-space:nowrap}.nav-item.active::before{display:none}
  .rail-foot{display:none}
  .topbar,.module-body{padding-left:16px;padding-right:16px}
  .kpi-strip{grid-template-columns:1fr 1fr}
  .dash-grid{grid-template-columns:1fr}
  .notes-split{grid-template-columns:1fr}
}
`;


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<App />);

<script>
// Plain-JS data backup and restore, independent of the app, so your data is always portable.
(function(){
  function snapshot(){
    var out = {};
    for (var i=0;i<localStorage.length;i++){
      var k = localStorage.key(i);
      if (k && k.indexOf("asset:") === 0) out[k] = localStorage.getItem(k);
    }
    return out;
  }
  document.getElementById("backupBtn").addEventListener("click", function(){
    var data = JSON.stringify({ app:"asset-retail-hub", saved:new Date().toISOString(), data:snapshot() }, null, 2);
    var blob = new Blob([data], {type:"application/json"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "asset-retail-hub-backup-" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
  });
  document.getElementById("restoreBtn").addEventListener("click", function(){
    document.getElementById("restoreInput").click();
  });
  document.getElementById("restoreInput").addEventListener("change", function(e){
    var file = e.target.files[0]; if(!file) return;
    var r = new FileReader();
    r.onload = function(){
      try {
        var parsed = JSON.parse(r.result);
        var d = parsed.data || parsed;
        if (!confirm("Restore this backup? It will replace the data currently in this workbook.")) return;
        Object.keys(d).forEach(function(k){ localStorage.setItem(k, d[k]); });
        location.reload();
      } catch(err){ alert("That file could not be read as a valid backup."); }
    };
    r.readAsText(file);
  });
})();
</script>
